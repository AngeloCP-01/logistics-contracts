# Shared OpenAPI components used across all platform services.
# Owned by logistics-contracts; consumed by service OpenAPI files via $ref.

openapi: 3.0.3
info:
  title: Logistics Platform — Common OpenAPI Components
  version: 0.3.0
  description: |
    Shared headers, schemas, and parameters referenced by every service's OpenAPI file.
    Defines the gateway-attached identity headers per the gateway design spec.

paths: {}

components:
  headers:
    XRequestId:
      description: |
        Unique correlation ID for the request. Generated by the gateway as UUID v7 if not present
        on the inbound request. Echoed on every response and propagated to every upstream call.
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{1,64}$'
        example: 01934d3e-2b3c-7000-8000-abc123def456

  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client-supplied correlation ID; honored if it matches `^[A-Za-z0-9_-]{1,64}$`.
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{1,64}$'
    XRequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client-supplied correlation ID; honored if it matches `^[A-Za-z0-9_-]{1,64}$`.
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{1,64}$'
    XServiceAuthorization:
      name: X-Service-Authorization
      in: header
      required: false
      description: |
        Service-to-service auth. Bearer <jwt> signed with SERVICE_JWT_SECRET.
        Mutually exclusive with `Authorization` (one or the other; never both).
      schema:
        type: string
        pattern: '^Bearer [A-Za-z0-9._-]+$'
    XOnBehalfOfUserId:
      name: X-On-Behalf-Of-User-Id
      in: header
      required: false
      description: |
        Trace context: the user ID that triggered an internal service call. Carries no auth weight.
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Validation error (RFC 7807)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Unauthorized:
      description: Missing or invalid authentication token (RFC 7807)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    Forbidden:
      description: Authenticated but not authorised (RFC 7807)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }
    NotFound:
      description: Resource not found (RFC 7807)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/ProblemDetails' }

  schemas:
    ProblemDetails:
      type: object
      description: RFC 7807 Problem Details. Returned on every error response.
      required: [type, title, status, requestId]
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem.
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        requestId:
          type: string
