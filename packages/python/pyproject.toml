[tool.poetry]
name = "logistics-contracts"
version = "0.3.0"
description = "Inter-service contracts for the AI Logistics Platform (Python types + JSON Schemas)."
authors = ["angelocp-01 <noreply@example.com>"]
license = "MIT"
readme = "README.md"
packages = [{ include = "logistics_contracts" }]
include = ["logistics_contracts/schemas/*.json"]

[tool.poetry.dependencies]
python = "^3.12"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
